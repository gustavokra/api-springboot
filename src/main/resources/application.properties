spring.application.name=demo

# Database connection URL, username, and password
spring.datasource.url=jdbc:postgresql://localhost:5433/teste_spring
spring.datasource.username=admin
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#create (apaga tudo e reinicia do zero) / update (ajusta o que mudou) / create-drop (cria inicio apaga quando para) / validate (só valida)/ none (não faz nada)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
